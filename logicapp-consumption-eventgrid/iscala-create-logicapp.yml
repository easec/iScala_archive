trigger: none
pr: none

name: create-logicapp-$(Date:yyyyMMdd)$(Rev:.r)

#resources:
#  pipelines:
#  - pipeline: createenv
#    source: iscala-create-env
#    trigger: true

parameters:
- name: targetEnv
  displayName: Target environment
  type: string
  default: dev
  values:
  - dev
  - prod

- name: azureServiceConnection
  displayName: Azure service connection
  type: string
  default: Azure-Service-Connection-Sub

- name: targetNodeVersion
  displayName: Target Node.js version
  type: string
  default: '22'
  values:
  - '20'
  - '22'
  - '24'

- name: allowPreviewNodeInProd
  displayName: Allow preview Node.js in PROD
  type: boolean
  default: false

- name: allowEolNode
  displayName: Allow EOL Node.js
  type: boolean
  default: false

variables:
# DEV
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: variable_iScalaArchive
  - name: resourceGroupName
    value: rg-iscala-archive-dev
  - name: rgLocation
    value: swedencentral
  - name: keyVaultName
    value: kv-iscala-archive-dev
  - name: sourceStorageAccount
    value: snapshottestsa
  - name: sourceStorageResourceGroup
    value: rg-iscala-archive-resources
  - name: sourceContainer
    value: snapshot
  - name: logicAppName
    value: la-iscala-archive-dev
  - name: triggerName
    value: manual
  - name: functionAppName
    value: fa-iscala-eg-proxy-dev
  - name: connectionsParametersFile
    value: logicapp-consumption-eventgrid/infra/parameters/connections.dev.parameters.json
  - name: logicAppParametersFile
    value: logicapp-consumption-eventgrid/logicapp/parameters/logicapp.dev.parameters.json
  - name: functionAppParametersFile
    value: logicapp-consumption-eventgrid/infra/parameters/functionapp.dev.parameters.json
  - name: deploymentEnvironment
    value: iscala-archive-dev

# PROD
- ${{ if eq(parameters.targetEnv, 'prod') }}:
  - group: variable_iScalaArchive-prod
  - name: resourceGroupName
    value: rg-iscala-archive-prod
  - name: rgLocation
    value: swedencentral
  - name: keyVaultName
    value: kv-iscala-archive-prod
  - name: sourceStorageAccount
    value: snapshottestsa
  - name: sourceStorageResourceGroup
    value: rg-iscala-archive-resources
  - name: sourceContainer
    value: snapshot
  - name: logicAppName
    value: la-iscala-archive-prod
  - name: triggerName
    value: manual
  - name: functionAppName
    value: fa-iscala-eg-proxy-prod
  - name: connectionsParametersFile
    value: logicapp-consumption-eventgrid/infra/parameters/connections.prod.parameters.json
  - name: logicAppParametersFile
    value: logicapp-consumption-eventgrid/logicapp/parameters/logicapp.prod.parameters.json
  - name: functionAppParametersFile
    value: logicapp-consumption-eventgrid/infra/parameters/functionapp.prod.parameters.json
  - name: deploymentEnvironment
    value: iscala-archive-prod

stages:
- stage: CreateLogicApp
  displayName: Create Logic App and Function (${{
    parameters.targetEnv }})
  jobs:

  - ${{ if eq(parameters.targetEnv, 'dev') }}:
    - job: CreateLogicAppDev
      displayName: Create Logic App DEV
      pool:
        name: easec-pool
      steps:
      - checkout: self

      - task: AzureCLI@2
        displayName: Validate shared source snapshot storage exists
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            az storage account show -n "$(sourceStorageAccount)" -g "$(sourceStorageResourceGroup)" -o none
            echo "Shared source snapshot storage exists."

            az storage container show \
              --account-name "$(sourceStorageAccount)" \
              --name "$(sourceContainer)" \
              --auth-mode login \
              -o none

            echo "Shared source container exists."

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Deploy Key Vault (dev)
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: logicapp-consumption-eventgrid/infra/keyvault.json
          overrideParameters: >
            -keyVaultName "$(keyVaultName)"
            -location "$(rgLocation)"
          deploymentMode: Incremental

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Deploy Connections (dev)
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: logicapp-consumption-eventgrid/infra/connections.json
          csmParametersFile: $(connectionsParametersFile)
          deploymentMode: Incremental

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Deploy Logic App (dev)
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: logicapp-consumption-eventgrid/logicapp/logicapp.json
          csmParametersFile: $(logicAppParametersFile)
          deploymentMode: Incremental

      - task: AzureCLI@2
        displayName: Guardrail - validate requested Node.js version
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            ENV="${{ parameters.targetEnv }}"
            TARGET="${{ parameters.targetNodeVersion }}"
            ALLOW_PREVIEW="${{ parameters.allowPreviewNodeInProd }}"
            ALLOW_EOL="${{ parameters.allowEolNode }}"

            fail() { echo "ERROR: $*" >&2; exit 1; }

            case "$TARGET" in
              22)
                echo "Node.js 22 selected: supported production choice."
                ;;
              24)
                echo "Node.js 24 selected."
                if [ "$ENV" = "prod" ] && [ "$ALLOW_PREVIEW" != "true" ]; then
                  fail "Node.js 24 is blocked in prod unless allowPreviewNodeInProd=true."
                fi
                ;;
              20)
                echo "Node.js 20 selected."
                if [ "$ALLOW_EOL" != "true" ]; then
                  fail "Node.js 20 is blocked unless allowEolNode=true."
                fi
                ;;
              *)
                fail "Unsupported targetNodeVersion '$TARGET'. Allowed values: 20, 22, 24."
                ;;
            esac

            echo "Node.js version guardrail passed."

      - bash: |
          set -euo pipefail

          FILE="$(functionAppParametersFile)"
          TARGET="${{ parameters.targetNodeVersion }}"
          EXPECTED="~${TARGET}"

          ACTUAL="$(python3 -c 'import json, os; p=os.environ["FILE"]; print(json.load(open(p))["parameters"]["nodeDefaultVersion"]["value"])')"

          echo "Parameter file nodeDefaultVersion: $ACTUAL"
          echo "Expected: $EXPECTED"

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "ERROR: function app parameter file version mismatch."
            exit 1
          fi
        displayName: Guardrail - verify ARM parameter file matches target Node.js
        env:
          FILE: $(functionAppParametersFile)

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Deploy Function infra (dev)
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: logicapp-consumption-eventgrid/infra/functionapp.json
          csmParametersFile: $(functionAppParametersFile)
          deploymentMode: Incremental
          deploymentOutputs: functionOutputs

      - script: |
          echo "##vso[task.setvariable variable=functionWebhookUrl]$(functionOutputs.functionWebhookUrl.value)"
          echo "##vso[task.setvariable variable=appInsightsName]$(functionOutputs.appInsightsName.value)"
        displayName: Set Function outputs variables

      - task: AzureCLI@2
        displayName: Check and update Function App Node.js version
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            RG="$(resourceGroupName)"
            FUNC="$(functionAppName)"
            TARGET_NODE="${{ parameters.targetNodeVersion }}"

            CURRENT_RUNTIME="$(az functionapp config appsettings list \
              -g "$RG" -n "$FUNC" \
              --query "[?name=='FUNCTIONS_EXTENSION_VERSION'].value | [0]" -o tsv)"

            CURRENT_NODE="$(az functionapp config appsettings list \
              -g "$RG" -n "$FUNC" \
              --query "[?name=='WEBSITE_NODE_DEFAULT_VERSION'].value | [0]" -o tsv)"

            echo "FUNCTIONS_EXTENSION_VERSION: ${CURRENT_RUNTIME:-<not set>}"
            echo "WEBSITE_NODE_DEFAULT_VERSION: ${CURRENT_NODE:-<not set>}"

            if [ "$CURRENT_RUNTIME" != "~4" ]; then
              echo "ERROR: Expected FUNCTIONS_EXTENSION_VERSION=~4"
              exit 1
            fi

            normalize() {
              echo "$1" | sed 's/[[:space:]]//g; s/^~//'
            }

            CURR_NORM="$(normalize "${CURRENT_NODE:-}")"
            TGT_NORM="$(normalize "$TARGET_NODE")"

            if [ "$CURR_NORM" != "$TGT_NORM" ]; then
              echo "Updating Node.js from '${CURRENT_NODE:-<not set>}' to '~$TARGET_NODE'"
              az functionapp config appsettings set \
                -g "$RG" -n "$FUNC" \
                --settings WEBSITE_NODE_DEFAULT_VERSION="~$TARGET_NODE" \
                -o none

              az functionapp restart -g "$RG" -n "$FUNC" -o none
            else
              echo "Node.js version already correct."
            fi

      - task: AzureCLI@2
        displayName: Grant Key Vault RBAC to service connection
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            RG="$(resourceGroupName)"
            KV="$(keyVaultName)"
            KV_ID="$(az keyvault show -g "$RG" -n "$KV" --query id -o tsv)"
            APP_ID="$(az account show --query user.name -o tsv)"

            if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
              echo "ERROR: Could not resolve Key Vault resource ID."
              exit 1
            fi

            if [ -z "$APP_ID" ] || [ "$APP_ID" = "null" ]; then
              echo "ERROR: Could not resolve service connection appId."
              exit 1
            fi

            echo "Granting Key Vault Secrets Officer to service connection appId: $APP_ID"
            az role assignment create \
              --assignee "$APP_ID" \
              --role "Key Vault Secrets Officer" \
              --scope "$KV_ID" \
              --only-show-errors || true

      - task: AzureCLI@2
        displayName: Grant Function App RBAC to Key Vault
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            RG="$(resourceGroupName)"
            KV="$(keyVaultName)"
            FUNC="$(functionAppName)"

            KV_ID="$(az keyvault show -g "$RG" -n "$KV" --query id -o tsv)"
            FUNC_PRINCIPAL_ID="$(az functionapp identity show -g "$RG" -n "$FUNC" --query principalId -o tsv)"

            if [ -z "$FUNC_PRINCIPAL_ID" ] || [ "$FUNC_PRINCIPAL_ID" = "null" ]; then
              echo "ERROR: Function App managed identity not found."
              exit 1
            fi

            echo "Granting Key Vault Secrets User to Function App principalId: $FUNC_PRINCIPAL_ID"
            az role assignment create \
              --assignee-object-id "$FUNC_PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role "Key Vault Secrets User" \
              --scope "$KV_ID" \
              --only-show-errors || true

      - task: AzureCLI@2
        displayName: Wait for Key Vault RBAC propagation
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail
            echo "Waiting 45 seconds for Key Vault RBAC propagation..."
            sleep 45

      - task: AzureCLI@2
        displayName: Store Logic App callback in Key Vault -> set Function Key Vault reference
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            RG="$(resourceGroupName)"
            LA="$(logicAppName)"
            TRIGGER="$(triggerName)"
            FUNC="$(functionAppName)"
            KV="$(keyVaultName)"
            SUB="$(az account show --query id -o tsv)"

            az functionapp show -g "$RG" -n "$FUNC" -o none
            az resource show -g "$RG" -n "$LA" --resource-type Microsoft.Logic/workflows -o none

            CALLBACK="$(az rest --method POST \
              --uri "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Logic/workflows/$LA/triggers/$TRIGGER/listCallbackUrl?api-version=2019-05-01" \
              --body '{}' --query "value" -o tsv)"

            if [ -z "$CALLBACK" ] || [ "$CALLBACK" = "null" ]; then
              echo "ERROR: Could not retrieve callback URL."
              exit 1
            fi

            az keyvault secret set \
              --vault-name "$KV" \
              --name "logicapp-callback-active" \
              --value "$CALLBACK" \
              -o none

            SECRET_URI="$(az keyvault secret show \
              --vault-name "$KV" \
              --name "logicapp-callback-active" \
              --query id -o tsv)"

            az functionapp config appsettings set \
              -g "$RG" -n "$FUNC" \
              --settings \
                "LOGICAPP_CALLBACK_URL_ACTIVE=@Microsoft.KeyVault(SecretUri=$SECRET_URI)" \
                "LOGICAPP_CALLBACK_URL_NEXT=" \
              -o none

            az functionapp restart -g "$RG" -n "$FUNC" -o none

            echo "Verify Key Vault reference:"
            az functionapp config appsettings list -g "$RG" -n "$FUNC" \
              --query "[?name=='LOGICAPP_CALLBACK_URL_ACTIVE'].{name:name,value:value}" -o table

  - ${{ if eq(parameters.targetEnv, 'prod') }}:
    - deployment: CreateLogicAppProd
      displayName: Create Logic App PROD
      environment: iscala-archive-prod
      pool:
        name: easec-pool
      strategy:
        runOnce:
          deploy:
            steps:
            - checkout: self

            - task: AzureCLI@2
              displayName: Validate shared source snapshot storage exists
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  az storage account show -n "$(sourceStorageAccount)" -g "$(sourceStorageResourceGroup)" -o none
                  echo "Shared source snapshot storage exists."

                  az storage container show \
                    --account-name "$(sourceStorageAccount)" \
                    --name "$(sourceContainer)" \
                    --auth-mode login \
                    -o none

                  echo "Shared source container exists."

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Key Vault (prod)
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: logicapp-consumption-eventgrid/infra/keyvault.json
                overrideParameters: >
                  -keyVaultName "$(keyVaultName)"
                  -location "$(rgLocation)"
                deploymentMode: Incremental

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Connections (prod)
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: logicapp-consumption-eventgrid/infra/connections.json
                csmParametersFile: $(connectionsParametersFile)
                deploymentMode: Incremental

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Logic App (prod)
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: logicapp-consumption-eventgrid/logicapp/logicapp.json
                csmParametersFile: $(logicAppParametersFile)
                deploymentMode: Incremental

            - task: AzureCLI@2
              displayName: Guardrail - validate requested Node.js version
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  ENV="${{ parameters.targetEnv }}"
                  TARGET="${{ parameters.targetNodeVersion }}"
                  ALLOW_PREVIEW="${{ parameters.allowPreviewNodeInProd }}"
                  ALLOW_EOL="${{ parameters.allowEolNode }}"

                  fail() { echo "ERROR: $*" >&2; exit 1; }

                  case "$TARGET" in
                    22)
                      echo "Node.js 22 selected: supported production choice."
                      ;;
                    24)
                      echo "Node.js 24 selected."
                      if [ "$ENV" = "prod" ] && [ "$ALLOW_PREVIEW" != "true" ]; then
                        fail "Node.js 24 is blocked in prod unless allowPreviewNodeInProd=true."
                      fi
                      ;;
                    20)
                      echo "Node.js 20 selected."
                      if [ "$ALLOW_EOL" != "true" ]; then
                        fail "Node.js 20 is blocked unless allowEolNode=true."
                      fi
                      ;;
                    *)
                      fail "Unsupported targetNodeVersion '$TARGET'. Allowed values: 20, 22, 24."
                      ;;
                  esac

                  echo "Node.js version guardrail passed."

            - bash: |
                set -euo pipefail

                FILE="$(functionAppParametersFile)"
                TARGET="${{ parameters.targetNodeVersion }}"
                EXPECTED="~${TARGET}"

                ACTUAL="$(python3 -c 'import json, os; p=os.environ["FILE"]; print(json.load(open(p))["parameters"]["nodeDefaultVersion"]["value"])')"

                echo "Parameter file nodeDefaultVersion: $ACTUAL"
                echo "Expected: $EXPECTED"

                if [ "$ACTUAL" != "$EXPECTED" ]; then
                  echo "ERROR: function app parameter file version mismatch."
                  exit 1
                fi
              displayName: Guardrail - verify ARM parameter file matches target Node.js
              env:
                FILE: $(functionAppParametersFile)

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Function infra (prod)
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: logicapp-consumption-eventgrid/infra/functionapp.json
                csmParametersFile: $(functionAppParametersFile)
                deploymentMode: Incremental
                deploymentOutputs: functionOutputs

            - script: |
                echo "##vso[task.setvariable variable=functionWebhookUrl]$(functionOutputs.functionWebhookUrl.value)"
                echo "##vso[task.setvariable variable=appInsightsName]$(functionOutputs.appInsightsName.value)"
              displayName: Set Function outputs variables

            - task: AzureCLI@2
              displayName: Check and update Function App Node.js version
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  RG="$(resourceGroupName)"
                  FUNC="$(functionAppName)"
                  TARGET_NODE="${{ parameters.targetNodeVersion }}"

                  CURRENT_RUNTIME="$(az functionapp config appsettings list \
                    -g "$RG" -n "$FUNC" \
                    --query "[?name=='FUNCTIONS_EXTENSION_VERSION'].value | [0]" -o tsv)"

                  CURRENT_NODE="$(az functionapp config appsettings list \
                    -g "$RG" -n "$FUNC" \
                    --query "[?name=='WEBSITE_NODE_DEFAULT_VERSION'].value | [0]" -o tsv)"

                  echo "FUNCTIONS_EXTENSION_VERSION: ${CURRENT_RUNTIME:-<not set>}"
                  echo "WEBSITE_NODE_DEFAULT_VERSION: ${CURRENT_NODE:-<not set>}"

                  if [ "$CURRENT_RUNTIME" != "~4" ]; then
                    echo "ERROR: Expected FUNCTIONS_EXTENSION_VERSION=~4"
                    exit 1
                  fi

                  normalize() {
                    echo "$1" | sed 's/[[:space:]]//g; s/^~//'
                  }

                  CURR_NORM="$(normalize "${CURRENT_NODE:-}")"
                  TGT_NORM="$(normalize "$TARGET_NODE")"

                  if [ "$CURR_NORM" != "$TGT_NORM" ]; then
                    echo "Updating Node.js from '${CURRENT_NODE:-<not set>}' to '~$TARGET_NODE'"
                    az functionapp config appsettings set \
                      -g "$RG" -n "$FUNC" \
                      --settings WEBSITE_NODE_DEFAULT_VERSION="~$TARGET_NODE" \
                      -o none

                    az functionapp restart -g "$RG" -n "$FUNC" -o none
                  else
                    echo "Node.js version already correct."
                  fi

            - task: AzureCLI@2
              displayName: Grant Key Vault RBAC to service connection
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  RG="$(resourceGroupName)"
                  KV="$(keyVaultName)"
                  KV_ID="$(az keyvault show -g "$RG" -n "$KV" --query id -o tsv)"
                  APP_ID="$(az account show --query user.name -o tsv)"

                  if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
                    echo "ERROR: Could not resolve Key Vault resource ID."
                    exit 1
                  fi

                  if [ -z "$APP_ID" ] || [ "$APP_ID" = "null" ]; then
                    echo "ERROR: Could not resolve service connection appId."
                    exit 1
                  fi

                  echo "Granting Key Vault Secrets Officer to service connection appId: $APP_ID"
                  az role assignment create \
                    --assignee "$APP_ID" \
                    --role "Key Vault Secrets Officer" \
                    --scope "$KV_ID" \
                    --only-show-errors || true

            - task: AzureCLI@2
              displayName: Grant Function App RBAC to Key Vault
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  RG="$(resourceGroupName)"
                  KV="$(keyVaultName)"
                  FUNC="$(functionAppName)"

                  KV_ID="$(az keyvault show -g "$RG" -n "$KV" --query id -o tsv)"
                  FUNC_PRINCIPAL_ID="$(az functionapp identity show -g "$RG" -n "$FUNC" --query principalId -o tsv)"

                  if [ -z "$FUNC_PRINCIPAL_ID" ] || [ "$FUNC_PRINCIPAL_ID" = "null" ]; then
                    echo "ERROR: Function App managed identity not found."
                    exit 1
                  fi

                  echo "Granting Key Vault Secrets User to Function App principalId: $FUNC_PRINCIPAL_ID"
                  az role assignment create \
                    --assignee-object-id "$FUNC_PRINCIPAL_ID" \
                    --assignee-principal-type ServicePrincipal \
                    --role "Key Vault Secrets User" \
                    --scope "$KV_ID" \
                    --only-show-errors || true

            - task: AzureCLI@2
              displayName: Wait for Key Vault RBAC propagation
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  echo "Waiting 45 seconds for Key Vault RBAC propagation..."
                  sleep 45

            - task: AzureCLI@2
              displayName: Store Logic App callback in Key Vault -> set Function Key Vault reference
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  RG="$(resourceGroupName)"
                  LA="$(logicAppName)"
                  TRIGGER="$(triggerName)"
                  FUNC="$(functionAppName)"
                  KV="$(keyVaultName)"
                  SUB="$(az account show --query id -o tsv)"

                  az functionapp show -g "$RG" -n "$FUNC" -o none
                  az resource show -g "$RG" -n "$LA" --resource-type Microsoft.Logic/workflows -o none

                  CALLBACK="$(az rest --method POST \
                    --uri "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Logic/workflows/$LA/triggers/$TRIGGER/listCallbackUrl?api-version=2019-05-01" \
                    --body '{}' --query "value" -o tsv)"

                  if [ -z "$CALLBACK" ] || [ "$CALLBACK" = "null" ]; then
                    echo "ERROR: Could not retrieve callback URL."
                    exit 1
                  fi

                  az keyvault secret set \
                    --vault-name "$KV" \
                    --name "logicapp-callback-active" \
                    --value "$CALLBACK" \
                    -o none

                  SECRET_URI="$(az keyvault secret show \
                    --vault-name "$KV" \
                    --name "logicapp-callback-active" \
                    --query id -o tsv)"

                  az functionapp config appsettings set \
                    -g "$RG" -n "$FUNC" \
                    --settings \
                      "LOGICAPP_CALLBACK_URL_ACTIVE=@Microsoft.KeyVault(SecretUri=$SECRET_URI)" \
                      "LOGICAPP_CALLBACK_URL_NEXT=" \
                    -o none

                  az functionapp restart -g "$RG" -n "$FUNC" -o none

                  echo "Verify Key Vault reference:"
                  az functionapp config appsettings list -g "$RG" -n "$FUNC" \
                    --query "[?name=='LOGICAPP_CALLBACK_URL_ACTIVE'].{name:name,value:value}" -o table
