trigger: none

parameters:
- name: targetEnv
  type: string
  default: dev
  values:
  - dev
  - prod

- name: azureServiceConnection
  type: string
  default: Azure-Service-Connection-Sub

variables:
# DEV
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: variable_iScalaArchive
  - name: storageAccount
    value: snapshottestsa
  - name: containerName
    value: snapshot
  - name: pageContainerName
    value: snapshot-page

# PROD
- ${{ if eq(parameters.targetEnv, 'prod') }}:
  - group: variable_iScalaArchive
  - name: storageAccount
    value: snapshottestsa
  - name: containerName
    value: snapshot
  - name: pageContainerName
    value: snapshot-page

stages:
- stage: ConvertAndCreateManagedDisks
  displayName: Convert VHD block blobs to page blobs and create managed disks
  jobs:
  - job: ConvertAndCreateManagedDisks
    displayName: Convert and create managed disks
    pool:
      name: easec-pool
    steps:
    - checkout: self

    - task: AzureCLI@2
      displayName: Convert block blob VHDs to page blobs with AzCopy
      inputs:
        azureSubscription: ${{ parameters.azureServiceConnection }}
        addSpnToEnvironment: true
        scriptType: pscore
        scriptLocation: inlineScript
        inlineScript: |
          $ErrorActionPreference = "Stop"

          $account       = "$(storageAccount)"
          $srcContainer  = "$(containerName)"      # working container with VHD block blobs
          $dstContainer  = "$(pageContainerName)"  # destination for PageBlobs

          Write-Host "Ensuring destination container exists: $dstContainer"
          az storage container create `
            --account-name $account `
            --name $dstContainer `
            --auth-mode login `
            --only-show-errors | Out-Null

          Write-Host "Discovering VHD block blobs in container '$srcContainer'..."
          $blobs = az storage blob list `
            --account-name $account `
            --container-name $srcContainer `
            --auth-mode login `
            --query "[?properties.blobType=='BlockBlob' && (ends_with(name, '.vhd') || ends_with(name, '.VHD'))].name" `
            -o tsv

          if (-not $blobs) {
            throw "No .VHD block blobs found in container '$srcContainer'."
          }

          $blobList = @($blobs | Where-Object { $_ -and $_.Trim() -ne "" })

          Write-Host "Found $($blobList.Count) VHD block blob(s):"
          $blobList | ForEach-Object { Write-Host " - $_" }

          if (-not (Get-Command azcopy -ErrorAction SilentlyContinue)) {
            throw "AzCopy is not installed or not available in PATH on this agent."
          }

          Write-Host "Configuring AzCopy service principal auth..."
          $env:AZCOPY_AUTO_LOGIN_TYPE   = "SPN"
          $env:AZCOPY_SPA_APPLICATION_ID = $env:servicePrincipalId
          $env:AZCOPY_SPA_CLIENT_SECRET  = $env:servicePrincipalKey
          $env:AZCOPY_TENANT_ID          = $env:tenantId

          foreach ($blob in $blobList) {
            $srcUrl = "https://$account.blob.core.windows.net/$srcContainer/$blob"
            $dstUrl = "https://$account.blob.core.windows.net/$dstContainer/$blob"

            Write-Host "Copying '$blob' as PageBlob..."
            azcopy copy $srcUrl $dstUrl --from-to=BlobBlob --blob-type=PageBlob

            if ($LASTEXITCODE -ne 0) {
              throw "AzCopy failed for blob '$blob'."
            }
          }

          Write-Host "Validating destination blob types..."
          foreach ($blob in $blobList) {
            $blobType = az storage blob show `
              --account-name $account `
              --container-name $dstContainer `
              --name $blob `
              --auth-mode login `
              --query "properties.blobType" `
              -o tsv

            Write-Host "$blob => $blobType"

            if ($blobType -ne "PageBlob") {
              throw "Blob '$blob' was not converted to PageBlob."
            }
          }

          Write-Host "Page blob conversion complete."

    - task: AzureCLI@2
      displayName: Detect OS disk and create managed disks
      inputs:
        azureSubscription: ${{ parameters.azureServiceConnection }}
        scriptType: pscore
        scriptLocation: inlineScript
        inlineScript: |
          $ErrorActionPreference = "Stop"

          $account       = "$(storageAccount)"
          $pageContainer = "$(pageContainerName)"
          $rg            = "$(resourceGroupName)"
          $location      = "$(location)"

          Write-Host "Discovering page blob VHDs in '$pageContainer'..."
          $pageBlobs = az storage blob list `
            --account-name $account `
            --container-name $pageContainer `
            --auth-mode login `
            --query "[?properties.blobType=='PageBlob' && (ends_with(name, '.vhd') || ends_with(name, '.VHD'))].[name,properties.contentLength]" `
            -o json | ConvertFrom-Json

          if (-not $pageBlobs -or $pageBlobs.Count -eq 0) {
            throw "No page blob VHDs found in container '$pageContainer'."
          }

          $report = @()

          foreach ($row in $pageBlobs) {
            $name = $row[0]
            $sizeBytes = [int64]$row[1]

            $score = 0
            $reasons = @()

            # Strong signals
            if ($name -match 'OSDisk') {
              $score += 150
              $reasons += "name contains OSDisk"
            }

            if ($name -match 'Cdisken') {
              $score += 120
              $reasons += "name contains Cdisken"
            }

            if ($name -match '^S_') {
              $score += 40
              $reasons += "name starts with S_"
            }

            # Weak positive signals
            if ($name -match '(^|[_-])OS([_-]|$)') {
              $score += 40
              $reasons += "name suggests OS"
            }

            if ($name -match 'Windows|System') {
              $score += 20
              $reasons += "name suggests Windows/system"
            }

            # Negative signals
            if ($name -match 'DataDisk') {
              $score -= 100
              $reasons += "name contains DataDisk"
            }

            if ($name -match 'TEMP|TEMPDB|LOG|DATA') {
              $score -= 80
              $reasons += "name suggests temp/log/data disk"
            }

            $sizeGiB = [math]::Round($sizeBytes / 1GB, 2)

            $diskName = ($name -replace '\.VHD$|\.vhd$','') `
                        -replace '[^A-Za-z0-9-]', '-' `
                        -replace '-+', '-' `
                        -replace '^-|-$',''

            $report += [pscustomobject]@{
              BlobName = $name
              DiskName = $diskName
              SizeGiB  = $sizeGiB
              Score    = $score
              Reasons  = ($reasons -join '; ')
            }
          }

          Write-Host "Validation report:"
          $report | Sort-Object Score -Descending | Format-Table -AutoSize | Out-String | Write-Host

          $osCandidate = $report | Sort-Object Score -Descending | Select-Object -First 1

          if (-not $osCandidate) {
            throw "Could not determine OS disk candidate."
          }

          if ($osCandidate.Score -lt 50) {
            throw "OS disk detection confidence too low. Top candidate: $($osCandidate.BlobName) with score $($osCandidate.Score)"
          }

          Write-Host "Chosen OS disk candidate: $($osCandidate.BlobName)"

          foreach ($item in $report) {
            $vhdUri = "https://$account.blob.core.windows.net/$pageContainer/$($item.BlobName)"

            $diskExists = az disk show `
              --resource-group $rg `
              --name $item.DiskName `
              --query "name" -o tsv 2>$null

            if ($LASTEXITCODE -eq 0 -and $diskExists) {
              Write-Host "Managed disk already exists, skipping: $($item.DiskName)"
              continue
            }

            if ($item.BlobName -eq $osCandidate.BlobName) {
              Write-Host "Creating OS managed disk: $($item.DiskName)"
              az disk create `
                --resource-group $rg `
                --name $item.DiskName `
                --location $location `
                --source $vhdUri `
                --os-type Windows `
                --hyper-v-generation V1 `
                --sku StandardSSD_LRS `
                --only-show-errors
            }
            else {
              Write-Host "Creating data managed disk: $($item.DiskName)"
              az disk create `
                --resource-group $rg `
                --name $item.DiskName `
                --location $location `
                --source $vhdUri `
                --sku StandardSSD_LRS `
                --only-show-errors
            }

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create managed disk '$($item.DiskName)' from blob '$($item.BlobName)'."
            }
          }

          Write-Host "Managed disk creation complete."