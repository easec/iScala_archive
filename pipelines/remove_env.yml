trigger: none
pr: none

parameters:
- name: targetEnv
  type: string
  default: dev
  values:
  - dev
  - prod

- name: azureServiceConnection
  type: string
  default: Azure-Service-Connection-Sub

variables:
# DEV
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: variable_iScalaArchive
  - name: resourceGroupName
    value: rg-iscala-archive-dev
  - name: storageAccount
    value: stiscalasnapshotdev
  - name: rgLocation
    value: swedencentral
  - name: containerName
    value: snapshot
  - name: keyVaultName
    value: kv-iscala-archive-dev

# PROD
- ${{ if eq(parameters.targetEnv, 'prod') }}:
  - group: variable_iScalaArchive-prod
  - name: resourceGroupName
    value: rg-iscala-archive-prod
  - name: storageAccount
    value: stiscalasnapshotprod
  - name: rgLocation
    value: swedencentral
  - name: containerName
    value: snapshot
  - name: keyVaultName
    value: kv-iscala-archive-prod

- name: deploymentPrincipalObjectId
  value: 94f97b9f-b688-4f99-a3ff-64e0e8a945d8

- name: storageAccountResourceId
  value: /subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroupName)/providers/Microsoft.Storage/storageAccounts/$(storageAccount)

stages:
- stage: Remove
  displayName: Remove ${{ parameters.targetEnv }}
  jobs:

  - ${{ if eq(parameters.targetEnv, 'dev') }}:
    - job: RemoveDev
      displayName: Remove DEV
      pool:
        name: easec-pool
      steps:
      - checkout: self

      - task: AzureCLI@2
        displayName: Remove environment
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            RESOURCE_GROUP="$(resourceGroupName)"
            LOCATION="$(rgLocation)"
            KEYVAULT="$(keyVaultName)"

            echo "Removing environment resources for: $RESOURCE_GROUP"
            echo "Shared storage account snapshottestsa will NOT be touched."
            echo "Shared container snapshot will NOT be touched."

            echo "Checking resource group: $RESOURCE_GROUP"
            if [ "$(az group exists --name "$RESOURCE_GROUP")" = "true" ]; then
              az group delete --name "$RESOURCE_GROUP" --yes --no-wait
              echo "Resource group deletion started: $RESOURCE_GROUP"

              echo "Waiting for resource group deletion to complete..."
              RG_DELETED=0
              for i in {1..60}; do
                if [ "$(az group exists --name "$RESOURCE_GROUP")" = "false" ]; then
                  RG_DELETED=1
                  echo "Resource group deleted: $RESOURCE_GROUP"
                  break
                fi

                echo "Resource group still deleting, waiting 10 seconds... ($i/60)"
                sleep 10
              done

              if [ "$RG_DELETED" -ne 1 ]; then
                echo "Resource group deletion did not finish within the wait period: $RESOURCE_GROUP"
              fi
            else
              echo "Resource group does not exist: $RESOURCE_GROUP"
            fi

            echo "Checking if Key Vault $KEYVAULT exists in deleted list."
            KV_FOUND=0
            for i in {1..30}; do
              if az keyvault list-deleted --query "[?name=='$KEYVAULT'] | length(@)" -o tsv | grep -q "^1$"; then
                KV_FOUND=1
                echo "Key Vault found in deleted list: $KEYVAULT"
                break
              fi

              echo "Key Vault not yet in deleted list, waiting 10 seconds... ($i/30)"
              sleep 10
            done

            if [ "$KV_FOUND" -eq 1 ]; then
              echo "Purging Key Vault: $KEYVAULT"
              az keyvault purge --name "$KEYVAULT" --location "$LOCATION" --no-wait
              echo "Key Vault purge started: $KEYVAULT"
            else
              echo "Key Vault did not appear in deleted list during this run: $KEYVAULT"
            fi

            echo "Environment removal started."
            echo "Shared working container was NOT deleted."

  - ${{ if eq(parameters.targetEnv, 'prod') }}:
    - deployment: RemoveProd
      displayName: Remove PROD (requires approval)
      environment: iscala-archive-prod
      pool:
        name: easec-pool
      strategy:
        runOnce:
          deploy:
            steps:
            - checkout: self

            - task: AzureCLI@2
              displayName: Remove environment
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  RESOURCE_GROUP="$(resourceGroupName)"
                  LOCATION="$(rgLocation)"
                  KEYVAULT="$(keyVaultName)"

                  echo "Removing environment resources for: $RESOURCE_GROUP"
                  echo "Shared storage account snapshottestsa will NOT be touched."
                  echo "Shared container snapshot will NOT be touched."

                  echo "Checking resource group: $RESOURCE_GROUP"
                  if [ "$(az group exists --name "$RESOURCE_GROUP")" = "true" ]; then
                    az group delete --name "$RESOURCE_GROUP" --yes --no-wait
                    echo "Resource group deletion started: $RESOURCE_GROUP"

                    echo "Waiting for resource group deletion to complete..."
                    RG_DELETED=0
                    for i in {1..60}; do
                      if [ "$(az group exists --name "$RESOURCE_GROUP")" = "false" ]; then
                        RG_DELETED=1
                        echo "Resource group deleted: $RESOURCE_GROUP"
                        break
                      fi

                      echo "Resource group still deleting, waiting 10 seconds... ($i/60)"
                      sleep 10
                    done

                    if [ "$RG_DELETED" -ne 1 ]; then
                      echo "Resource group deletion did not finish within the wait period: $RESOURCE_GROUP"
                    fi
                  else
                    echo "Resource group does not exist: $RESOURCE_GROUP"
                  fi

                  echo "Checking if Key Vault $KEYVAULT exists in deleted list."
                  KV_FOUND=0
                  for i in {1..30}; do
                    if az keyvault list-deleted --query "[?name=='$KEYVAULT'] | length(@)" -o tsv | grep -q "^1$"; then
                      KV_FOUND=1
                      echo "Key Vault found in deleted list: $KEYVAULT"
                      break
                    fi

                    echo "Key Vault not yet in deleted list, waiting 10 seconds... ($i/30)"
                    sleep 10
                  done

                  if [ "$KV_FOUND" -eq 1 ]; then
                    echo "Purging Key Vault: $KEYVAULT"
                    az keyvault purge --name "$KEYVAULT" --location "$LOCATION" --no-wait
                    echo "Key Vault purge started: $KEYVAULT"
                  else
                    echo "Key Vault did not appear in deleted list during this run: $KEYVAULT"
                  fi

                  echo "Environment removal started."
                  echo "Shared working container was NOT deleted."
