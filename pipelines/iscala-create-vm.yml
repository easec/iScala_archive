trigger: none
pr: none

name: create-vm-$(Date:yyyyMMdd)$(Rev:.r)

parameters:
- name: targetEnv
  displayName: Target environment
  type: string
  default: dev
  values:
  - dev
  - prod

- name: azureServiceConnection
  displayName: Azure service connection
  type: string
  default: Azure-Service-Connection-Sub

- name: vmName
  displayName: VM name (required)
  type: string
  default: ''

- name: resourceTags
  displayName: Resource tags (optional, max 4, format key;value,key;value)
  type: string
  default: ''

- name: vmSize
  displayName: VM size
  type: string
  default: Standard_D4s_v5

- name: createPublicIp
  displayName: Create public IP
  type: boolean
  default: false

- name: allowPublicIpInProd
  displayName: Allow public IP in PROD
  type: boolean
  default: false

- name: vnetNameOverride
  displayName: Existing VNet name (optional)
  type: string
  default: ''

- name: subnetNameOverride
  displayName: Existing subnet name (optional)
  type: string
  default: ''

resources:
  pipelines:
  - pipeline: convertdisks
    source: iscala-convert-disks
    trigger: true

variables:
# DEV
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: variable_iScalaArchive
  - name: targetResourceGroup
    value: rg-iscala-archive-dev
  - name: location
    value: swedencentral
  - name: defaultVnetName
    value: iscala-archive-dev-vnet
  - name: defaultSubnetName
    value: default
  - name: nicName
    value: ${{ parameters.vmName }}-nic
  - name: publicIpName
    value: ${{ parameters.vmName }}-pip
  - name: nsgName
    value: ${{ parameters.vmName }}-nsg
  - name: vnetAddressPrefix
    value: 10.60.0.0/16
  - name: subnetPrefix
    value: 10.60.1.0/24
  - name: deploymentEnvironment
    value: iscala-archive-dev

# PROD
- ${{ if eq(parameters.targetEnv, 'prod') }}:
  - group: variable_iScalaArchive-prod
  - name: targetResourceGroup
    value: rg-iscala-archive-prod
  - name: location
    value: swedencentral
  - name: defaultVnetName
    value: iscala-archive-prod-vnet
  - name: defaultSubnetName
    value: default
  - name: nicName
    value: ${{ parameters.vmName }}-nic
  - name: publicIpName
    value: ${{ parameters.vmName }}-pip
  - name: nsgName
    value: ${{ parameters.vmName }}-nsg
  - name: vnetAddressPrefix
    value: 10.61.0.0/16
  - name: subnetPrefix
    value: 10.61.1.0/24
  - name: deploymentEnvironment
    value: iscala-archive-prod

stages:
- stage: CreateVm
  displayName: Create VM from restored managed disks
  jobs:
  - deployment: CreateVm
    displayName: Create VM
    environment: $(deploymentEnvironment)
    pool:
      name: easec-pool
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Create VM from restored managed disks
            inputs:
              azureSubscription: ${{ parameters.azureServiceConnection }}
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                $ErrorActionPreference = "Stop"

                function Apply-TagsToResource {
                  param(
                    [string]$ResourceId,
                    [string[]]$TagArgs
                  )

                  if (-not $ResourceId -or -not $TagArgs -or $TagArgs.Count -eq 0) {
                    return
                  }

                  az tag update `
                    --resource-id $ResourceId `
                    --operation Merge `
                    --tags $TagArgs `
                    --only-show-errors | Out-Null
                }

                function Get-TagArgs {
                  param([string]$ResourceTagsInput)

                  $tagArgs = @()

                  if (-not [string]::IsNullOrWhiteSpace($ResourceTagsInput)) {
                    $pairs = $ResourceTagsInput -split ','

                    if ($pairs.Count -gt 4) {
                      throw "A maximum of 4 tags is allowed."
                    }

                    foreach ($pair in $pairs) {
                      $trimmed = $pair.Trim()
                      if ([string]::IsNullOrWhiteSpace($trimmed)) {
                        continue
                      }

                      $kv = $trimmed -split ';', 2
                      if ($kv.Count -ne 2) {
                        throw "Invalid tag format '$trimmed'. Use key;value,key;value"
                      }

                      $key = $kv[0].Trim()
                      $value = $kv[1].Trim()

                      if ([string]::IsNullOrWhiteSpace($key) -or [string]::IsNullOrWhiteSpace($value)) {
                        throw "Invalid tag format '$trimmed'. Key and value must not be empty."
                      }

                      $tagArgs += "$key=$value"
                    }
                  }

                  return $tagArgs
                }

                $rg                 = "$(targetResourceGroup)"
                $location           = "$(location)"
                $vmName             = "${{ parameters.vmName }}".Trim()
                $resourceTagsInput  = "${{ parameters.resourceTags }}".Trim()
                $vmSize             = "${{ parameters.vmSize }}"
                $defaultVnetName    = "$(defaultVnetName)"
                $defaultSubnetName  = "$(defaultSubnetName)"
                $vnetNameOverride   = "${{ parameters.vnetNameOverride }}".Trim()
                $subnetNameOverride = "${{ parameters.subnetNameOverride }}".Trim()
                $nicName            = "$(nicName)"
                $publicIpName       = "$(publicIpName)"
                $nsgName            = "$(nsgName)"
                $vnetPrefix         = "$(vnetAddressPrefix)"
                $subnetPrefix       = "$(subnetPrefix)"
                $targetEnv          = "${{ parameters.targetEnv }}"
                $createPublicIp     = "${{ parameters.createPublicIp }}".ToLower() -eq "true"
                $allowPublicIpProd  = "${{ parameters.allowPublicIpInProd }}".ToLower() -eq "true"

                if ([string]::IsNullOrWhiteSpace($vmName)) {
                  throw "Parameter 'vmName' is mandatory and cannot be empty."
                }

                if ($vmName.Length -gt 64) {
                  throw "Parameter 'vmName' is too long. Keep it at 64 characters or less."
                }

                if ($vmName -notmatch '^[A-Za-z0-9-]+$') {
                  throw "Parameter 'vmName' may only contain letters, numbers, and hyphens."
                }

                $tagArgs = Get-TagArgs -ResourceTagsInput $resourceTagsInput

                if (([string]::IsNullOrWhiteSpace($vnetNameOverride) -and -not [string]::IsNullOrWhiteSpace($subnetNameOverride)) -or
                    (-not [string]::IsNullOrWhiteSpace($vnetNameOverride) -and [string]::IsNullOrWhiteSpace($subnetNameOverride))) {
                  throw "Provide both Existing VNet name and Existing subnet name, or leave both blank."
                }

                if (-not [string]::IsNullOrWhiteSpace($vnetNameOverride)) {
                  $vnetName = $vnetNameOverride
                  $subnetName = $subnetNameOverride

                  $existingVnet = az network vnet show `
                    --resource-group $rg `
                    --name $vnetName `
                    --query "name" -o tsv 2>$null

                  if (-not $existingVnet) {
                    throw "Specified VNet '$vnetName' was not found in resource group '$rg'."
                  }

                  $existingSubnet = az network vnet subnet show `
                    --resource-group $rg `
                    --vnet-name $vnetName `
                    --name $subnetName `
                    --query "name" -o tsv 2>$null

                  if (-not $existingSubnet) {
                    throw "Specified subnet '$subnetName' was not found in VNet '$vnetName'."
                  }

                  Write-Host "Using existing VNet/subnet: $vnetName / $subnetName"
                }
                else {
                  $vnetName = $defaultVnetName
                  $subnetName = $defaultSubnetName
                  Write-Host "Using default environment VNet/subnet: $vnetName / $subnetName"
                }

                Write-Host "Resource group : $rg"
                Write-Host "VM name        : $vmName"
                Write-Host "Location       : $location"
                Write-Host "VM size        : $vmSize"
                Write-Host "Tags           : $($tagArgs -join ', ')"

                $usePublicIp = $false
                if ($createPublicIp) {
                  if ($targetEnv -eq "prod" -and -not $allowPublicIpProd) {
                    throw "Public IP was requested for PROD, but allowPublicIpInProd is false."
                  }
                  $usePublicIp = $true
                }

                Write-Host "createPublicIp      : $createPublicIp"
                Write-Host "allowPublicIpInProd : $allowPublicIpProd"
                Write-Host "usePublicIp         : $usePublicIp"

                $allDiskRows = az disk list `
                  --resource-group $rg `
                  --query "[].[name,id,tags]" `
                  -o json | ConvertFrom-Json

                if (-not $allDiskRows -or $allDiskRows.Count -eq 0) {
                  throw "No managed disks found in resource group '$rg'. Run the restore disk pipeline first."
                }

                $report = @()

                foreach ($row in $allDiskRows) {
                  $name = $row[0]
                  $id   = $row[1]
                  $tags = $row[2]

                  $score = 0
                  $reasons = @()

                  if ($tags -and $tags.DiskRole -eq 'os') {
                    $score += 1000
                    $reasons += "DiskRole=os tag"
                  }

                  if ($name -match '(?i)-osdisk$') {
                    $score += 300
                    $reasons += "name ends with osdisk"
                  }

                  if ($name -match '(?i)osdisk') {
                    $score += 200
                    $reasons += "name contains osdisk"
                  }

                  if ($name -match '(?i)cdisken') {
                    $score += 200
                    $reasons += "name contains cdisken"
                  }

                  if ($name -match '(?i)^sqlvm-osdisk$') {
                    $score += 300
                    $reasons += "explicit sqlvm osdisk"
                  }

                  if ($name -match '(?i)tempdb') {
                    $score -= 200
                    $reasons += "name contains tempdb"
                  }

                  if ($name -match '(?i)log') {
                    $score -= 150
                    $reasons += "name contains log"
                  }

                  if ($name -match '(?i)data|datadisk') {
                    $score -= 150
                    $reasons += "name contains data/datadisk"
                  }

                  $report += [pscustomobject]@{
                    DiskName = $name
                    DiskId   = $id
                    Tags     = $tags
                    Score    = $score
                    Reasons  = ($reasons -join '; ')
                  }
                }

                Write-Host "Disk detection report:"
                $report | Sort-Object Score -Descending | Select-Object DiskName, Score, Reasons | Format-Table -AutoSize | Out-String | Write-Host

                $osDisk = $report | Sort-Object Score -Descending | Select-Object -First 1

                if (-not $osDisk -or $osDisk.Score -lt 50) {
                  throw "OS disk detection confidence too low."
                }

                $dataDisks = $report | Where-Object { $_.DiskName -ne $osDisk.DiskName }

                $orderedDataDisks = @()
                $preferredPatterns = @(
                  '(?i)tempdb',
                  '(?i)data1|ldata1|datadisk0',
                  '(?i)log'
                )

                foreach ($pattern in $preferredPatterns) {
                  $matches = $dataDisks | Where-Object { $_.DiskName -match $pattern }
                  foreach ($match in $matches) {
                    if ($orderedDataDisks.DiskName -notcontains $match.DiskName) {
                      $orderedDataDisks += $match
                    }
                  }
                }

                foreach ($disk in $dataDisks) {
                  if ($orderedDataDisks.DiskName -notcontains $disk.DiskName) {
                    $orderedDataDisks += $disk
                  }
                }

                Write-Host "Chosen OS disk: $($osDisk.DiskName)"
                Write-Host "Data disk attach order:"
                if (-not $orderedDataDisks -or $orderedDataDisks.Count -eq 0) {
                  Write-Host " - none"
                }
                else {
                  $orderedDataDisks | ForEach-Object { Write-Host " - $($_.DiskName)" }
                }

                $vnetExists = az network vnet show `
                  --resource-group $rg `
                  --name $vnetName `
                  --query "name" -o tsv 2>$null

                if (-not $vnetExists) {
                  if (-not [string]::IsNullOrWhiteSpace($vnetNameOverride)) {
                    throw "Specified VNet '$vnetName' was not found."
                  }

                  Write-Host "Creating VNet: $vnetName"
                  az network vnet create `
                    --resource-group $rg `
                    --location $location `
                    --name $vnetName `
                    --address-prefixes $vnetPrefix `
                    --subnet-name $subnetName `
                    --subnet-prefixes $subnetPrefix `
                    --only-show-errors | Out-Null
                }
                else {
                  Write-Host "VNet already exists: $vnetName"

                  $subnetExists = az network vnet subnet show `
                    --resource-group $rg `
                    --vnet-name $vnetName `
                    --name $subnetName `
                    --query "name" -o tsv 2>$null

                  if (-not $subnetExists) {
                    if (-not [string]::IsNullOrWhiteSpace($vnetNameOverride)) {
                      throw "Specified subnet '$subnetName' was not found in VNet '$vnetName'."
                    }

                    Write-Host "Creating subnet: $subnetName"
                    az network vnet subnet create `
                      --resource-group $rg `
                      --vnet-name $vnetName `
                      --name $subnetName `
                      --address-prefixes $subnetPrefix `
                      --only-show-errors | Out-Null
                  }
                }

                $nsgExists = az network nsg show `
                  --resource-group $rg `
                  --name $nsgName `
                  --query "name" -o tsv 2>$null

                if (-not $nsgExists) {
                  Write-Host "Creating NSG: $nsgName"
                  az network nsg create `
                    --resource-group $rg `
                    --location $location `
                    --name $nsgName `
                    --only-show-errors | Out-Null
                }
                else {
                  Write-Host "NSG already exists: $nsgName"
                }

                az network nsg rule create `
                  --resource-group $rg `
                  --nsg-name $nsgName `
                  --name Allow-RDP `
                  --priority 1000 `
                  --direction Inbound `
                  --access Allow `
                  --protocol Tcp `
                  --source-address-prefixes Internet `
                  --source-port-ranges "*" `
                  --destination-address-prefixes "*" `
                  --destination-port-ranges 3389 `
                  --only-show-errors | Out-Null

                if ($usePublicIp) {
                  $pipExists = az network public-ip show `
                    --resource-group $rg `
                    --name $publicIpName `
                    --query "name" -o tsv 2>$null

                  if (-not $pipExists) {
                    Write-Host "Creating Public IP: $publicIpName"
                    az network public-ip create `
                      --resource-group $rg `
                      --location $location `
                      --name $publicIpName `
                      --sku Standard `
                      --allocation-method Static `
                      --only-show-errors | Out-Null
                  }
                  else {
                    Write-Host "Public IP already exists: $publicIpName"
                  }
                }

                $nicExists = az network nic show `
                  --resource-group $rg `
                  --name $nicName `
                  --query "name" -o tsv 2>$null

                if (-not $nicExists) {
                  Write-Host "Creating NIC: $nicName"

                  if ($usePublicIp) {
                    az network nic create `
                      --resource-group $rg `
                      --location $location `
                      --name $nicName `
                      --vnet-name $vnetName `
                      --subnet $subnetName `
                      --network-security-group $nsgName `
                      --public-ip-address $publicIpName `
                      --only-show-errors | Out-Null
                  }
                  else {
                    az network nic create `
                      --resource-group $rg `
                      --location $location `
                      --name $nicName `
                      --vnet-name $vnetName `
                      --subnet $subnetName `
                      --network-security-group $nsgName `
                      --only-show-errors | Out-Null
                  }
                }
                else {
                  Write-Host "NIC already exists: $nicName"
                }

                az network nic update `
                  --resource-group $rg `
                  --name $nicName `
                  --network-security-group $nsgName `
                  --only-show-errors | Out-Null

                if ($usePublicIp) {
                  $ipConfigName = az network nic show `
                    --resource-group $rg `
                    --name $nicName `
                    --query "ipConfigurations[0].name" `
                    -o tsv

                  $currentPipId = az network nic show `
                    --resource-group $rg `
                    --name $nicName `
                    --query "ipConfigurations[0].publicIPAddress.id" `
                    -o tsv 2>$null

                  $desiredPipId = az network public-ip show `
                    --resource-group $rg `
                    --name $publicIpName `
                    --query "id" `
                    -o tsv

                  if ($currentPipId -ne $desiredPipId) {
                    Write-Host "Associating Public IP '$publicIpName' to NIC '$nicName'"
                    az network nic ip-config update `
                      --resource-group $rg `
                      --nic-name $nicName `
                      --name $ipConfigName `
                      --public-ip-address $publicIpName `
                      --only-show-errors | Out-Null
                  }
                  else {
                    Write-Host "Public IP already associated to NIC '$nicName'."
                  }
                }

                Write-Host "Checking quota for VM size: $vmSize in region: $location"

                $vmSizeInfo = az vm list-sizes `
                  --location $location `
                  --query "[?name=='$vmSize'] | [0]" `
                  -o json | ConvertFrom-Json

                if (-not $vmSizeInfo) {
                  throw "VM size '$vmSize' was not found in region '$location'."
                }

                $requiredCores = [int]$vmSizeInfo.numberOfCores
                Write-Host "VM size $vmSize requires $requiredCores vCPU(s)."

                $usage = az vm list-usage `
                  --location $location `
                  -o json | ConvertFrom-Json

                $totalRegional = $usage | Where-Object { $_.name.value -eq "cores" }

                if (-not $totalRegional) {
                  throw "Could not find total regional vCPU quota in usage output."
                }

                $totalAvail = [int]$totalRegional.limit - [int]$totalRegional.currentValue
                Write-Host "Regional cores available: $totalAvail"

                if ($totalAvail -lt $requiredCores) {
                  throw "QuotaExceeded: Not enough regional vCPU quota in '$location'. Required=$requiredCores, available=$totalAvail."
                }

                $familyCode = $null
                if ($vmSize -match '^Standard_D\d+s_v5$') {
                  $familyCode = "standardDSv5Family"
                }

                if ($familyCode) {
                  $familyUsage = $usage | Where-Object { $_.name.value -eq $familyCode }
                  if ($familyUsage) {
                    $familyAvail = [int]$familyUsage.limit - [int]$familyUsage.currentValue
                    Write-Host "Family quota ($familyCode) available: $familyAvail"

                    if ($familyAvail -lt $requiredCores) {
                      throw "QuotaExceeded: Not enough $familyCode quota in '$location'. Required=$requiredCores, available=$familyAvail."
                    }
                  }
                }

                $vmExists = az vm show `
                  --resource-group $rg `
                  --name $vmName `
                  --query "name" -o tsv 2>$null

                if (-not $vmExists) {
                  Write-Host "Creating VM: $vmName"
                  Write-Host "Using OS disk ID: $($osDisk.DiskId)"

                  az vm create `
                    --resource-group $rg `
                    --name $vmName `
                    --attach-os-disk $($osDisk.DiskId) `
                    --os-type Windows `
                    --size $vmSize `
                    --nics $nicName `
                    -o json | Out-Null

                  if ($LASTEXITCODE -ne 0) {
                    throw "VM creation failed for '$vmName'."
                  }
                }
                else {
                  Write-Host "VM already exists: $vmName"
                }

                $vmExists = az vm show `
                  --resource-group $rg `
                  --name $vmName `
                  --query "name" -o tsv 2>$null

                if (-not $vmExists) {
                  throw "VM '$vmName' does not exist, so data disks cannot be attached."
                }

                foreach ($disk in $orderedDataDisks) {
                  $diskName = $disk.DiskName

                  $attachedCount = az vm show `
                    --resource-group $rg `
                    --name $vmName `
                    --query "length(storageProfile.dataDisks[?name=='$diskName'])" `
                    -o tsv

                  if ($attachedCount -eq "0") {
                    Write-Host "Attaching data disk: $diskName"
                    az vm disk attach `
                      --resource-group $rg `
                      --vm-name $vmName `
                      --name $diskName `
                      --only-show-errors | Out-Null

                    if ($LASTEXITCODE -ne 0) {
                      throw "Failed to attach data disk '$diskName'."
                    }
                  }
                  else {
                    Write-Host "Disk already attached: $diskName"
                  }
                }

                $vmId = az vm show `
                  --resource-group $rg `
                  --name $vmName `
                  --query "id" -o tsv 2>$null
                Apply-TagsToResource -ResourceId $vmId -TagArgs $tagArgs

                $nicId = az network nic show `
                  --resource-group $rg `
                  --name $nicName `
                  --query "id" -o tsv 2>$null
                Apply-TagsToResource -ResourceId $nicId -TagArgs $tagArgs

                $nsgId = az network nsg show `
                  --resource-group $rg `
                  --name $nsgName `
                  --query "id" -o tsv 2>$null
                Apply-TagsToResource -ResourceId $nsgId -TagArgs $tagArgs

                if ($usePublicIp) {
                  $pipId = az network public-ip show `
                    --resource-group $rg `
                    --name $publicIpName `
                    --query "id" -o tsv 2>$null
                  Apply-TagsToResource -ResourceId $pipId -TagArgs $tagArgs
                }

                $powerState = az vm get-instance-view `
                  --resource-group $rg `
                  --name $vmName `
                  --query "instanceView.statuses[?starts_with(code, 'PowerState/')].displayStatus | [0]" `
                  -o tsv 2>$null

                $publicIp = ""
                if ($usePublicIp) {
                  $publicIp = az network public-ip show `
                    --resource-group $rg `
                    --name $publicIpName `
                    --query "ipAddress" -o tsv 2>$null
                }

                Write-Host "==== VM SUMMARY ===="
                Write-Host "VM name       : $vmName"
                Write-Host "Resource group: $rg"
                Write-Host "VNet          : $vnetName"
                Write-Host "Subnet        : $subnetName"
                Write-Host "OS disk       : $($osDisk.DiskName)"
                Write-Host "Data disks    : $($orderedDataDisks.DiskName -join ', ')"
                Write-Host "NIC           : $nicName"
                Write-Host "NSG           : $nsgName"
                Write-Host "Power state   : $powerState"
                Write-Host "Public IP     : $publicIp"
                Write-Host "Tags          : $($tagArgs -join ', ')"
                Write-Host "VM pipeline complete."
