trigger: none
pr: none

name: convert-disks-$(Date:yyyyMMdd)$(Rev:.r)

parameters:
- name: targetEnv
  type: string
  default: dev
  values:
  - dev
  - prod

- name: azureServiceConnection
  type: string
  default: Azure-Service-Connection-Sub

variables:
- name: rehydratedSourceStorageAccount
  value: snapshottestsa

- name: rehydratedSourceContainer
  value: snapshot

# DEV
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: variable_iScalaArchive
  - name: targetStorageAccount
    value: stiscalasnapshotdev
  - name: targetResourceGroup
    value: rg-iscala-archive-dev
  - name: targetContainer
    value: vhds
  - name: location
    value: swedencentral

# PROD
- ${{ if eq(parameters.targetEnv, 'prod') }}:
  - group: variable_iScalaArchive-prod
  - name: targetStorageAccount
    value: stiscalasnapshotprod
  - name: targetResourceGroup
    value: rg-iscala-archive-prod
  - name: targetContainer
    value: vhds
  - name: location
    value: swedencentral

stages:
- stage: ConvertAndCreateDisks
  displayName: Convert archived BlockBlobs to PageBlob and create managed disks
  jobs:

  - ${{ if eq(parameters.targetEnv, 'dev') }}:
    - job: ConvertAndCreateDisksDev
      displayName: Convert and create disks DEV
      pool:
        name: easec-pool
      steps:
      - checkout: self

      - task: AzureCLI@2
        displayName: Copy Block blobs to target account as stable PageBlob VHDs
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: |
            $ErrorActionPreference = "Stop"

            function Get-DestinationBlobName {
              param([string]$SourceBlobName)

              $baseName = [System.IO.Path]::GetFileNameWithoutExtension($SourceBlobName)

              switch -Regex ($baseName) {
                '(?i)^S_Cdisken$'       { return 'sqlvm-osdisk.vhd' }
                '(?i)^H_SQLVMTEMPDB$'   { return 'sqlvm-tempdb.vhd' }
                '(?i)^V_SQLVMLOG$'      { return 'sqlvm-log.vhd' }
                '(?i)^X_SQLVMLDATA1$'   { return 'sqlvm-data1.vhd' }

                '^(.*)-osdisk-\d{14}$' {
                  return "$($matches[1])-osdisk.vhd"
                }

                '^(.*)-datadisk(\d+)-\d{14}$' {
                  return "$($matches[1])-datadisk$($matches[2]).vhd"
                }

                default {
                  return ($SourceBlobName -replace '\.BIN$|\.bin$|\.VHD$|\.vhd$', '.vhd')
                }
              }
            }

            $srcAccount   = "$(rehydratedSourceStorageAccount)"
            $srcContainer = "$(rehydratedSourceContainer)"
            $dstAccount   = "$(targetStorageAccount)"
            $dstContainer = "$(targetContainer)"

            Write-Host "=== RESOLVED VALUES ==="
            Write-Host "sourceStorageAccount = $srcAccount"
            Write-Host "sourceContainer      = $srcContainer"
            Write-Host "targetStorageAccount = $dstAccount"
            Write-Host "targetContainer      = $dstContainer"

            az storage container create `
              --account-name $dstAccount `
              --name $dstContainer `
              --auth-mode login `
              --only-show-errors | Out-Null

            $blobRows = az storage blob list `
              --account-name $srcAccount `
              --container-name $srcContainer `
              --auth-mode login `
              --query "[?properties.blobType=='BlockBlob' && (ends_with(name, '.vhd') || ends_with(name, '.VHD') || ends_with(name, '.bin') || ends_with(name, '.BIN'))].[name,properties.contentLength]" `
              -o json | ConvertFrom-Json

            if (-not $blobRows -or $blobRows.Count -eq 0) {
              throw "No .vhd or .bin block blobs found in $srcAccount/$srcContainer"
            }

            Write-Host "Found $($blobRows.Count) archived block blob(s)."
            $blobRows | ForEach-Object { Write-Host " - $($_[0])" }

            if (-not (Get-Command azcopy -ErrorAction SilentlyContinue)) {
              throw "AzCopy is not installed or not available in PATH on this agent."
            }

            $expiry = (Get-Date).ToUniversalTime().AddHours(4).ToString("yyyy-MM-ddTHH:mmZ")

            $srcSas = az storage container generate-sas `
              --account-name $srcAccount `
              --name $srcContainer `
              --auth-mode login `
              --as-user `
              --permissions rl `
              --expiry $expiry `
              -o tsv

            $dstSas = az storage container generate-sas `
              --account-name $dstAccount `
              --name $dstContainer `
              --auth-mode login `
              --as-user `
              --permissions racwdl `
              --expiry $expiry `
              -o tsv

            if (-not $srcSas) { throw "Failed to generate SAS for source container." }
            if (-not $dstSas) { throw "Failed to generate SAS for destination container." }

            $azcopyLogDir = "$(Agent.TempDirectory)/azcopy-logs"
            New-Item -ItemType Directory -Force -Path $azcopyLogDir | Out-Null
            $env:AZCOPY_LOG_LOCATION = $azcopyLogDir

            foreach ($row in $blobRows) {
              $sourceBlobName = $row[0]
              $destBlobName = Get-DestinationBlobName -SourceBlobName $sourceBlobName

              $srcUrl = "https://$srcAccount.blob.core.windows.net/$srcContainer/$sourceBlobName`?$srcSas"
              $dstUrl = "https://$dstAccount.blob.core.windows.net/$dstContainer/$destBlobName`?$dstSas"

              Write-Host "Copying $sourceBlobName as PageBlob -> $destBlobName"
              $azcopyOutput = azcopy copy $srcUrl $dstUrl --from-to=BlobBlob --blob-type=PageBlob --overwrite=true 2>&1
              $azcopyExitCode = $LASTEXITCODE
              $azcopyOutput | ForEach-Object { Write-Host $_ }

              if ($azcopyExitCode -ne 0) {
                $latestLog = Get-ChildItem -Path $azcopyLogDir -Filter *.log -ErrorAction SilentlyContinue |
                  Sort-Object LastWriteTime -Descending |
                  Select-Object -First 1

                if ($latestLog) {
                  Write-Host "Latest AzCopy log: $($latestLog.FullName)"
                  Get-Content $latestLog.FullName -Tail 100 | Write-Host
                }

                throw "AzCopy failed for blob '$sourceBlobName' with exit code $azcopyExitCode"
              }
            }

            foreach ($row in $blobRows) {
              $sourceBlobName = $row[0]
              $blobName = Get-DestinationBlobName -SourceBlobName $sourceBlobName

              $blobType = az storage blob show `
                --account-name $dstAccount `
                --container-name $dstContainer `
                --name $blobName `
                --auth-mode login `
                --query "properties.blobType" `
                -o tsv

              Write-Host "$blobName => $blobType"

              if ($blobType -ne "PageBlob") {
                throw "Blob '$blobName' is not a PageBlob in destination."
              }
            }

            Write-Host "PageBlob conversion complete."

      - task: AzureCLI@2
        displayName: Detect OS disk and create managed disks
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: |
            $ErrorActionPreference = "Stop"

            function Get-ManagedDiskName {
              param([string]$BlobName)

              switch -Regex ($BlobName) {
                '(?i)^sqlvm-osdisk\.vhd$'  { return 'sqlvm-osdisk' }
                '(?i)^sqlvm-tempdb\.vhd$'  { return 'sqlvm-tempdb' }
                '(?i)^sqlvm-log\.vhd$'     { return 'sqlvm-log' }
                '(?i)^sqlvm-data1\.vhd$'   { return 'sqlvm-data1' }

                default {
                  return (($BlobName -replace '\.VHD$|\.vhd$','') `
                    -replace '[^A-Za-z0-9-]', '-' `
                    -replace '-+', '-' `
                    -replace '^-|-$','')
                }
              }
            }

            $account   = "$(targetStorageAccount)"
            $container = "$(targetContainer)"
            $rg        = "$(targetResourceGroup)"
            $location  = "$(location)"

            $pageBlobs = az storage blob list `
              --account-name $account `
              --container-name $container `
              --auth-mode login `
              --query "[?properties.blobType=='PageBlob' && (ends_with(name, '.vhd') || ends_with(name, '.VHD'))].[name,properties.contentLength]" `
              -o json | ConvertFrom-Json

            if (-not $pageBlobs -or $pageBlobs.Count -eq 0) {
              throw "No PageBlob VHDs found in $account/$container"
            }

            $report = @()

            foreach ($row in $pageBlobs) {
              $name = $row[0]
              $sizeBytes = [int64]$row[1]

              $score = 0
              $reasons = @()

              if ($name -match '(?i)^sqlvm-osdisk\.vhd$') {
                $score += 400
                $reasons += "explicit mapped os disk"
              }

              if ($name -match '(?i)Cdisken') {
                $score += 300
                $reasons += "name contains cdisken"
              }

              if ($name -match '^S_') {
                $score += 120
                $reasons += "name starts with S_"
              }

              if ($name -match '(?i)OSDisk') {
                $score += 150
                $reasons += "name contains osdisk"
              }

              if ($name -match '(?i)^sqlvm-tempdb\.vhd$') {
                $score -= 250
                $reasons += "explicit mapped tempdb disk"
              }

              if ($name -match '(?i)^sqlvm-log\.vhd$') {
                $score -= 220
                $reasons += "explicit mapped log disk"
              }

              if ($name -match '(?i)^sqlvm-data1\.vhd$') {
                $score -= 200
                $reasons += "explicit mapped data disk"
              }

              if ($name -match '(?i)TEMPDB') {
                $score -= 200
                $reasons += "name contains tempdb"
              }

              if ($name -match '(?i)SQLVMLOG|LOG') {
                $score -= 180
                $reasons += "name contains log"
              }

              if ($name -match '(?i)LDATA|DATA') {
                $score -= 150
                $reasons += "name contains data"
              }

              if ($name -match '(?i)DataDisk') {
                $score -= 100
                $reasons += "name contains datadisk"
              }

              $diskName = Get-ManagedDiskName -BlobName $name

              $report += [pscustomobject]@{
                BlobName = $name
                DiskName = $diskName
                SizeGiB  = [math]::Round($sizeBytes / 1GB, 2)
                Score    = $score
                Reasons  = ($reasons -join '; ')
              }
            }

            Write-Host "Validation report:"
            $report | Sort-Object Score -Descending | Format-Table -AutoSize | Out-String | Write-Host

            $osCandidate = $report | Sort-Object Score -Descending | Select-Object -First 1

            if (-not $osCandidate -or $osCandidate.Score -lt 50) {
              throw "OS disk detection confidence too low."
            }

            Write-Host "Chosen OS disk: $($osCandidate.BlobName)"

            foreach ($item in $report) {
              $vhdUri = "https://$account.blob.core.windows.net/$container/$($item.BlobName)"

              $existingDisk = az disk show `
                --resource-group $rg `
                --name $item.DiskName `
                --query "name" -o tsv 2>$null

              if ($LASTEXITCODE -eq 0 -and $existingDisk) {
                Write-Host "Managed disk already exists, skipping: $($item.DiskName)"
                continue
              }

              if ($item.BlobName -eq $osCandidate.BlobName) {
                Write-Host "Creating OS managed disk: $($item.DiskName)"
                az disk create `
                  --resource-group $rg `
                  --name $item.DiskName `
                  --location $location `
                  --source $vhdUri `
                  --os-type Windows `
                  --hyper-v-generation V1 `
                  --sku StandardSSD_LRS `
                  --only-show-errors
              }
              else {
                Write-Host "Creating data managed disk: $($item.DiskName)"
                az disk create `
                  --resource-group $rg `
                  --name $item.DiskName `
                  --location $location `
                  --source $vhdUri `
                  --sku StandardSSD_LRS `
                  --only-show-errors
              }
            }

  - ${{ if eq(parameters.targetEnv, 'prod') }}:
    - deployment: ConvertAndCreateDisksProd
      displayName: Convert and create disks PROD
      environment: iscala-archive-prod
      pool:
        name: easec-pool
      strategy:
        runOnce:
          deploy:
            steps:
            - checkout: self

            - task: AzureCLI@2
              displayName: Copy Block blobs to target account as stable PageBlob VHDs
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: pscore
                scriptLocation: inlineScript
                inlineScript: |
                  $ErrorActionPreference = "Stop"

                  function Get-DestinationBlobName {
                    param([string]$SourceBlobName)

                    $baseName = [System.IO.Path]::GetFileNameWithoutExtension($SourceBlobName)

                    switch -Regex ($baseName) {
                      '(?i)^S_Cdisken$'       { return 'sqlvm-osdisk.vhd' }
                      '(?i)^H_SQLVMTEMPDB$'   { return 'sqlvm-tempdb.vhd' }
                      '(?i)^V_SQLVMLOG$'      { return 'sqlvm-log.vhd' }
                      '(?i)^X_SQLVMLDATA1$'   { return 'sqlvm-data1.vhd' }

                      '^(.*)-osdisk-\d{14}$' {
                        return "$($matches[1])-osdisk.vhd"
                      }

                      '^(.*)-datadisk(\d+)-\d{14}$' {
                        return "$($matches[1])-datadisk$($matches[2]).vhd"
                      }

                      default {
                        return ($SourceBlobName -replace '\.BIN$|\.bin$|\.VHD$|\.vhd$', '.vhd')
                      }
                    }
                  }

                  $srcAccount   = "$(rehydratedSourceStorageAccount)"
                  $srcContainer = "$(rehydratedSourceContainer)"
                  $dstAccount   = "$(targetStorageAccount)"
                  $dstContainer = "$(targetContainer)"

                  Write-Host "=== RESOLVED VALUES ==="
                  Write-Host "sourceStorageAccount = $srcAccount"
                  Write-Host "sourceContainer      = $srcContainer"
                  Write-Host "targetStorageAccount = $dstAccount"
                  Write-Host "targetContainer      = $dstContainer"

                  az storage container create `
                    --account-name $dstAccount `
                    --name $dstContainer `
                    --auth-mode login `
                    --only-show-errors | Out-Null

                  $blobRows = az storage blob list `
                    --account-name $srcAccount `
                    --container-name $srcContainer `
                    --auth-mode login `
                    --query "[?properties.blobType=='BlockBlob' && (ends_with(name, '.vhd') || ends_with(name, '.VHD') || ends_with(name, '.bin') || ends_with(name, '.BIN'))].[name,properties.contentLength]" `
                    -o json | ConvertFrom-Json

                  if (-not $blobRows -or $blobRows.Count -eq 0) {
                    throw "No .vhd or .bin block blobs found in $srcAccount/$srcContainer"
                  }

                  Write-Host "Found $($blobRows.Count) archived block blob(s)."
                  $blobRows | ForEach-Object { Write-Host " - $($_[0])" }

                  if (-not (Get-Command azcopy -ErrorAction SilentlyContinue)) {
                    throw "AzCopy is not installed or not available in PATH on this agent."
                  }

                  $expiry = (Get-Date).ToUniversalTime().AddHours(4).ToString("yyyy-MM-ddTHH:mmZ")

                  $srcSas = az storage container generate-sas `
                    --account-name $srcAccount `
                    --name $srcContainer `
                    --auth-mode login `
                    --as-user `
                    --permissions rl `
                    --expiry $expiry `
                    -o tsv

                  $dstSas = az storage container generate-sas `
                    --account-name $dstAccount `
                    --name $dstContainer `
                    --auth-mode login `
                    --as-user `
                    --permissions racwdl `
                    --expiry $expiry `
                    -o tsv

                  if (-not $srcSas) { throw "Failed to generate SAS for source container." }
                  if (-not $dstSas) { throw "Failed to generate SAS for destination container." }

                  $azcopyLogDir = "$(Agent.TempDirectory)/azcopy-logs"
                  New-Item -ItemType Directory -Force -Path $azcopyLogDir | Out-Null
                  $env:AZCOPY_LOG_LOCATION = $azcopyLogDir

                  foreach ($row in $blobRows) {
                    $sourceBlobName = $row[0]
                    $destBlobName = Get-DestinationBlobName -SourceBlobName $sourceBlobName

                    $srcUrl = "https://$srcAccount.blob.core.windows.net/$srcContainer/$sourceBlobName`?$srcSas"
                    $dstUrl = "https://$dstAccount.blob.core.windows.net/$dstContainer/$destBlobName`?$dstSas"

                    Write-Host "Copying $sourceBlobName as PageBlob -> $destBlobName"
                    $azcopyOutput = azcopy copy $srcUrl $dstUrl --from-to=BlobBlob --blob-type=PageBlob --overwrite=true 2>&1
                    $azcopyExitCode = $LASTEXITCODE
                    $azcopyOutput | ForEach-Object { Write-Host $_ }

                    if ($azcopyExitCode -ne 0) {
                      $latestLog = Get-ChildItem -Path $azcopyLogDir -Filter *.log -ErrorAction SilentlyContinue |
                        Sort-Object LastWriteTime -Descending |
                        Select-Object -First 1

                      if ($latestLog) {
                        Write-Host "Latest AzCopy log: $($latestLog.FullName)"
                        Get-Content $latestLog.FullName -Tail 100 | Write-Host
                      }

                      throw "AzCopy failed for blob '$sourceBlobName' with exit code $azcopyExitCode"
                    }
                  }

                  foreach ($row in $blobRows) {
                    $sourceBlobName = $row[0]
                    $blobName = Get-DestinationBlobName -SourceBlobName $sourceBlobName

                    $blobType = az storage blob show `
                      --account-name $dstAccount `
                      --container-name $dstContainer `
                      --name $blobName `
                      --auth-mode login `
                      --query "properties.blobType" `
                      -o tsv

                    Write-Host "$blobName => $blobType"

                    if ($blobType -ne "PageBlob") {
                      throw "Blob '$blobName' is not a PageBlob in destination."
                    }
                  }

                  Write-Host "PageBlob conversion complete."

            - task: AzureCLI@2
              displayName: Detect OS disk and create managed disks
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: pscore
                scriptLocation: inlineScript
                inlineScript: |
                  $ErrorActionPreference = "Stop"

                  function Get-ManagedDiskName {
                    param([string]$BlobName)

                    switch -Regex ($BlobName) {
                      '(?i)^sqlvm-osdisk\.vhd$'  { return 'sqlvm-osdisk' }
                      '(?i)^sqlvm-tempdb\.vhd$'  { return 'sqlvm-tempdb' }
                      '(?i)^sqlvm-log\.vhd$'     { return 'sqlvm-log' }
                      '(?i)^sqlvm-data1\.vhd$'   { return 'sqlvm-data1' }

                      default {
                        return (($BlobName -replace '\.VHD$|\.vhd$','') `
                          -replace '[^A-Za-z0-9-]', '-' `
                          -replace '-+', '-' `
                          -replace '^-|-$','')
                      }
                    }
                  }

                  $account   = "$(targetStorageAccount)"
                  $container = "$(targetContainer)"
                  $rg        = "$(targetResourceGroup)"
                  $location  = "$(location)"

                  $pageBlobs = az storage blob list `
                    --account-name $account `
                    --container-name $container `
                    --auth-mode login `
                    --query "[?properties.blobType=='PageBlob' && (ends_with(name, '.vhd') || ends_with(name, '.VHD'))].[name,properties.contentLength]" `
                    -o json | ConvertFrom-Json

                  if (-not $pageBlobs -or $pageBlobs.Count -eq 0) {
                    throw "No PageBlob VHDs found in $account/$container"
                  }

                  $report = @()

                  foreach ($row in $pageBlobs) {
                    $name = $row[0]
                    $sizeBytes = [int64]$row[1]
                    $score = 0
                    $reasons = @()

                    if ($name -match '(?i)^sqlvm-osdisk\.vhd$') { $score += 400; $reasons += "explicit mapped os disk" }
                    if ($name -match '(?i)Cdisken') { $score += 300; $reasons += "name contains cdisken" }
                    if ($name -match '^S_') { $score += 120; $reasons += "name starts with S_" }
                    if ($name -match '(?i)OSDisk') { $score += 150; $reasons += "name contains osdisk" }

                    if ($name -match '(?i)^sqlvm-tempdb\.vhd$') { $score -= 250; $reasons += "explicit mapped tempdb disk" }
                    if ($name -match '(?i)^sqlvm-log\.vhd$') { $score -= 220; $reasons += "explicit mapped log disk" }
                    if ($name -match '(?i)^sqlvm-data1\.vhd$') { $score -= 200; $reasons += "explicit mapped data disk" }

                    if ($name -match '(?i)TEMPDB') { $score -= 200; $reasons += "name contains tempdb" }
                    if ($name -match '(?i)SQLVMLOG|LOG') { $score -= 180; $reasons += "name contains log" }
                    if ($name -match '(?i)LDATA|DATA') { $score -= 150; $reasons += "name contains data" }
                    if ($name -match '(?i)DataDisk') { $score -= 100; $reasons += "name contains datadisk" }

                    $diskName = Get-ManagedDiskName -BlobName $name

                    $report += [pscustomobject]@{
                      BlobName = $name
                      DiskName = $diskName
                      SizeGiB  = [math]::Round($sizeBytes / 1GB, 2)
                      Score    = $score
                      Reasons  = ($reasons -join '; ')
                    }
                  }

                  Write-Host "Validation report:"
                  $report | Sort-Object Score -Descending | Format-Table -AutoSize | Out-String | Write-Host

                  $osCandidate = $report | Sort-Object Score -Descending | Select-Object -First 1

                  if (-not $osCandidate -or $osCandidate.Score -lt 50) {
                    throw "OS disk detection confidence too low."
                  }

                  Write-Host "Chosen OS disk: $($osCandidate.BlobName)"

                  foreach ($item in $report) {
                    $vhdUri = "https://$account.blob.core.windows.net/$container/$($item.BlobName)"

                    $existingDisk = az disk show `
                      --resource-group $rg `
                      --name $item.DiskName `
                      --query "name" -o tsv 2>$null

                    if ($LASTEXITCODE -eq 0 -and $existingDisk) {
                      Write-Host "Managed disk already exists, skipping: $($item.DiskName)"
                      continue
                    }

                    if ($item.BlobName -eq $osCandidate.BlobName) {
                      Write-Host "Creating OS managed disk: $($item.DiskName)"
                      az disk create `
                        --resource-group $rg `
                        --name $item.DiskName `
                        --location $location `
                        --source $vhdUri `
                        --os-type Windows `
                        --hyper-v-generation V2 `
                        --sku StandardSSD_LRS `
                        --only-show-errors
                    }
                    else {
                      Write-Host "Creating data managed disk: $($item.DiskName)"
                      az disk create `
                        --resource-group $rg `
                        --name $item.DiskName `
                        --location $location `
                        --source $vhdUri `
                        --sku StandardSSD_LRS `
                        --only-show-errors
                    }
                  }
