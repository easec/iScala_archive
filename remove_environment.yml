trigger:
- main

parameters:
- name: targetEnv
  type: string
  default: dev
  values:
  - dev
  - prod

- name: azureServiceConnection
  type: string
  default: Azure-Service-Connection-Sub

variables:
# DEV
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: variable_iScalaArchive
  - name: resourceGroupName
    value: rg-iscala-archive-dev
  - name: storageAccount
    value: stiscalasnapshotdev
  - name: rgLocation
    value: swedencentral
  - name: containerName
    value: snapshot
  - name: keyVaultName
    value: kv-iscala-archive-dev

# PROD
- ${{ if eq(parameters.targetEnv, 'prod') }}:
  - group: variable_iScalaArchive-prod
  - name: resourceGroupName
    value: rg-iscala-archive-prod
  - name: rgLocation
    value: swedencentral
  - name: containerName
    value: snapshot
  - name: keyVaultName
    value: kv-iscala-archive-prod


- name: deploymentPrincipalObjectId
  value: 94f97b9f-b688-4f99-a3ff-64e0e8a945d8

- name: storageAccountResourceId
  value: /subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroupName)/providers/Microsoft.Storage/storageAccounts/$(storageAccount)

stages:
- stage: Deploy
  displayName: Deploy ${{ parameters.targetEnv }}
  jobs:

  - ${{ if eq(parameters.targetEnv, 'dev') }}:
    - job: DeployDev
      displayName: Deploy DEV
      pool:
        name: easec-pool
      steps:
      - checkout: self

      - task: AzureCLI@2
        displayName: Remove environment
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -e
            RESOURCE_GROUP="$(resourceGroupName)"
            LOCATION="$(rgLocation)"
            STORAGE_ACCOUNT="$(storageAccount)"
            CONTAINER_NAME="$(containerName)"
            KEYVAULT="$(keyVaultName)"

            echo "Checking resource group: $RESOURCE_GROUP"
            if [ "$(az group exists --name "$RESOURCE_GROUP")" = "true" ]; then
              az group delete --name "$RESOURCE_GROUP" --yes
              echo "Resource group: $RESOURCE_GROUP deleted"
            else
              echo "Resource group: $RESOURCE_GROUP does´nt exist"

            fi
            
            echo "Checking if Key Vault exists in deleted list: $KEYVAULT"

            if az keyvault list-deleted --query "[?name=='$KEYVAULT'] | length(@)" -o tsv | grep -q "^1$"; then
              echo "Purging Key Vault: $KEYVAULT"
              az keyvault purge --name "$KEYVAULT" --location "$LOCATION" --no-wait
              echo "Key Vault: $KEYVAULT purge started"
            else
              echo "Key Vault $KEYVAULT was not found in deleted vault list, already purge"
            fi

            echo "Environment for iScala archive deleted."


  - ${{ if eq(parameters.targetEnv, 'prod') }}:
    - deployment: DeployProd
      displayName: Deploy PROD (requires approval)
      environment: iscala-archive-prod
      pool:
        name: easec-pool
      strategy:
        runOnce:
          deploy:
            steps:
            - checkout: self

            - task: AzureCLI@2
              displayName: Remove environment
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -e
                  RESOURCE_GROUP="$(resourceGroupName)"
                  LOCATION="$(rgLocation)"
                  STORAGE_ACCOUNT="$(storageAccount)"
                  CONTAINER_NAME="$(containerName)"

                  echo "Checking resource group: $RESOURCE_GROUP"
                  if [ "$(az group exists --name "$RESOURCE_GROUP")" = "true" ]; then
                    az group delete --name "$RESOURCE_GROUP"
                    echo "Resource group: $RESOURCE_GROUP deleted"
                  else
                    echo "Resource group: $RESOURCE_GROUP does´nt exist"

                  fi
                  echo "Purge Key Vault: $KEYVAULT"
                  az keyvault purge --name "$KEYVAULT" --location "$LOCATION" --no-wait

                  echo "Resource Group deleted."