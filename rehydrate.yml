trigger:
- main

parameters:
- name: targetEnv
  type: string
  default: dev
  values:
  - dev
  - prod

- name: azureServiceConnection
  type: string
  default: Azure-Service-Connection-Sub

variables:
# DEV
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: variable_iScalaArchive
  - name: storageAccount
    value: snapshottestsa
  - name: sourceContainer
    value: iscala-archive
  - name: containerName
    value: snapshot

# PROD
- ${{ if eq(parameters.targetEnv, 'prod') }}:
  - group: variable_iScalaArchive-prod
  - name: resourceGroupName
    value: rg-iscala-archive-prod
  - name: rgLocation
    value: swedencentral
  - name: containerName
    value: snapshot


- name: deploymentPrincipalObjectId
  value: 94f97b9f-b688-4f99-a3ff-64e0e8a945d8

- name: storageAccountResourceId
  value: /subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroupName)/providers/Microsoft.Storage/storageAccounts/$(storageAccount)

stages:
- stage: Deploy
  displayName: Deploy ${{ parameters.targetEnv }}
  jobs:

  - ${{ if eq(parameters.targetEnv, 'dev') }}:
    - job: DeployDev
      displayName: Deploy DEV
      pool:
        name: easec-pool
      steps:
      - checkout: self
      - task: AzureCLI@2
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: "pscore"
          scriptLocation: "inlineScript"
          inlineScript: |
            $ErrorActionPreference = "Stop"

            $account      = "$(storageAccount)"
            $srcContainer = "$(sourceContainer)"   # WORM container (immutable)
            $dstContainer = "$(containerName)"     # Working container (NOT WORM)

            Write-Host "Listing blobs in source (WORM) container: $srcContainer"
            $blobs = az storage blob list `
              --account-name $account `
              --container-name $srcContainer `
              --auth-mode login `
              --query "[].name" -o tsv

            if (-not $blobs) { throw "No blobs found in source container '$srcContainer'." }

            foreach ($blob in $blobs) {
              Write-Host "----"
              Write-Host "Blob: $blob"

              $tier = az storage blob show `
                --account-name $account `
                --container-name $srcContainer `
                --name $blob `
                --auth-mode login `
                --query "properties.blobTier" -o tsv

              Write-Host "Source tier: $tier"

              if ($tier -eq "Archive") {
                Write-Host "Archive -> starting copy that rehydrates to Hot (Standard)."
                az storage blob copy start `
                  --account-name $account `
                  --auth-mode login `
                  --source-container $srcContainer `
                  --source-blob $blob `
                  --destination-container $dstContainer `
                  --destination-blob $blob `
                  --tier hot `
                  --rehydrate-priority standard | Out-Null
              }
              else {
                Write-Host "Not Archive -> starting normal copy (destination tier Hot)."
                az storage blob copy start `
                  --account-name $account `
                  --auth-mode login `
                  --source-container $srcContainer `
                  --source-blob $blob `
                  --destination-container $dstContainer `
                  --destination-blob $blob `
                  --tier hot | Out-Null
              }
            }

            Write-Host "All copy operations started."
      
  - ${{ if eq(parameters.targetEnv, 'prod') }}:
    - deployment: DeployProd
      displayName: Deploy PROD (requires approval)
      environment: iscala-archive-prod
      pool:
        name: easec-pool
      strategy:
        runOnce:
          deploy:
            steps:
            - checkout: self

            - task: AzureCLI@2
              inputs:
                azureSubscription: "connection_snapshottestsa"
                scriptType: "pscore"
                scriptLocation: "inlineScript"
                inlineScript: |
                  $ErrorActionPreference = "Stop"

                  $account      = "$(storageAccount)"
                  $srcContainer = "$(sourceContainer)"   # WORM container (immutable)
                  $dstContainer = "$(containerName)"     # Working container (NOT WORM)

                  Write-Host "Listing blobs in source (WORM) container: $srcContainer"
                  $blobs = az storage blob list `
                    --account-name $account `
                    --container-name $srcContainer `
                    --auth-mode login `
                    --query "[].name" -o tsv

                  if (-not $blobs) { throw "No blobs found in source container '$srcContainer'." }

                  foreach ($blob in $blobs) {
                    Write-Host "----"
                    Write-Host "Blob: $blob"

                    $tier = az storage blob show `
                      --account-name $account `
                      --container-name $srcContainer `
                      --name $blob `
                      --auth-mode login `
                      --query "properties.blobTier" -o tsv

                    Write-Host "Source tier: $tier"

                    if ($tier -eq "Archive") {
                      Write-Host "Archive -> starting copy that rehydrates to Hot (Standard)."
                      az storage blob copy start `
                        --account-name $account `
                        --auth-mode login `
                        --source-container $srcContainer `
                        --source-blob $blob `
                        --destination-container $dstContainer `
                        --destination-blob $blob `
                        --tier hot `
                        --rehydrate-priority standard | Out-Null
                    }
                    else {
                      Write-Host "Not Archive -> starting normal copy (destination tier Hot)."
                      az storage blob copy start `
                        --account-name $account `
                        --auth-mode login `
                        --source-container $srcContainer `
                        --source-blob $blob `
                        --destination-container $dstContainer `
                        --destination-blob $blob `
                        --tier hot | Out-Null
                    }
                  }

                  Write-Host "All copy operations started."