# This pipeline will:
# - Check if container already exists, if not it will create it.
# - Rehydrate archived snapshot files, from Archived to Hot.
# - Enable and start Logic App.
# 
#
# The variables are provided by Variable group with the name: variable_iScaleArchive
#
#
# Pipeline are used with User assigned managed identity
#
# This pipeline also expects Azure (Resource Manager) service connections in Azure DevOps with the name 'Azure-Service-Connection-Sub'. This service connections must have been set up in the Project Settings.


trigger: none
pr: none

pool:
  name: easec-pool
  
variables:
- group: variable_iScalaArchive

stages:
- stage: check_resource_group_exist
  jobs:
  - job:
    steps:
      - task: AzureCLI@2
        inputs:
          azureSubscription: "Azure-Service-Connection-Sub"
          scriptType: "bash"
          scriptLocation: "inlineScript"
          inlineScript: |
            set -e

            rgNameProd="rg-iscala-archive-prod"
            rgLocationProd="swedencentral"

            if [ "$(az group exists --name "$rgNameProd")" = "true" ]; then
                echo "Resource group '$rgNameProd' already exists."
            else
                echo "Creating resource group '$rgNameProd' in '$rgLocationProd'..."
                az group create --name "$rgNameProd" --location "$rgLocationProd" --output table
            fi


- stage: check_storage_account_exist
  jobs:
  - job:
    steps:
      - task: AzureCLI@2
        inputs:
          azureSubscription: "Azure-Service-Connection-Sub"
          scriptType: "bash"
          scriptLocation: "inlineScript"
          inlineScript: |
            set -e

            rgNameProd="rg-iscala-archive-prod"
            rgLocationProd="swedencentral"
            storageAccountProd="stiscalasnapshotprod"

            if az storage account show \
              --name $storageAccountProd \
              --resource-group $rgNameProd \
              --query "name" -o tsv 2>/dev/null; then
              
              echo "Storage account already exists: $storageAccountProd"

            else

              echo "Storage account not found. Creating..."
              az storage account create \
                --name $storageAccountProd \
                --resource-group $rgNameProd \
                --location $rgLocationProd \
                --sku Standard_LRS \
                --kind StorageV2

              echo "Storage account created."

            fi

- stage: check_container_exist
  jobs:
  - job:
    steps:
      - task: AzureCLI@2
        inputs:
          azureSubscription: "Azure-Service-Connection-Sub"
          scriptType: "bash"
          scriptLocation: "inlineScript"
          inlineScript: |
            exist=$(az storage container exists --account-name "$(storageAccountProd)" --auth-mode login --name "$(containerName)" --query [exists] -o tsv)
            echo $exist
            if [ "$exist" = "true" ]; then
              echo "Container exist"
            else
              echo "Container does´nt exist"
              az storage container create --name "$(containerName)" --account-name "$(storageAccountProd)" --auth-mode login
            fi

- stage: start_logic_app
  jobs:
  - job:
    steps:
    - task: AzurePowerShell@5
      inputs:
       azureSubscription: "connection_subscription"
       azurePowerShellVersion: "LatestVersion"
       scriptType: "InlineScript"
       Inline: |
        Set-AzLogicApp -ResourceGroupName "$(resourceGroupResources)" -Name "$(logicAppName)" -State "Enabled" -Force
        Start-AzLogicApp -ResourceGroupName "$(resourceGroupResources)" -Name "$(logicAppName)" -TriggerName "$(triggerName)"
        
- stage: re_hydrate
  jobs:
  - job:
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: "Azure-Service-Connection-Sub"
        scriptType: "pscore"
        scriptLocation: "inlineScript"
        inlineScript: |
          $ErrorActionPreference = "Stop"

          $account      = "$(storageAccount)"
          $srcContainer = "$(sourceContainer)"   # WORM container
          $dstContainer = "$(containerName)"     # working container (not WORM)

          Write-Host "Listing blobs in source container: $srcContainer"
          $blobs = az storage blob list `
            --account-name $account `
            --container-name $srcContainer `
            --auth-mode login `
            --query "[].name" -o tsv

          if (-not $blobs) { throw "No blobs found in source container '$srcContainer'." }

          foreach ($blob in $blobs) {
            Write-Host "----"
            Write-Host "Blob: $blob"

            $tier = az storage blob show `
              --account-name $account `
              --container-name $srcContainer `
              --name $blob `
              --auth-mode login `
              --query "properties.blobTier" -o tsv

            Write-Host "Source tier: $tier"
            }