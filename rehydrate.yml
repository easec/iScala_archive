# This pipeline will:
# - Check if container already exists, if not it will create it.
# - Rehydrate archived snapshot files, from Archived to Hot.

# 
#
# The variables are provided by Variable group with the name: variable_iScaleArchive
#
#
# Pipeline are used with User assigned managed identity
#
# This pipeline also expects Azure (Resource Manager) service connections in Azure DevOps with the name 'Azure-Service-Connection-Sub'. This service connections must have been set up in the Project Settings.


trigger: none
pr: none

pool:
  name: easec-pool

variables:
  rgNameProd: "rg-iscala-archive-prod"
  rgLocationProd: "swedencentral"
  storageAccountProd: "stiscalasnapshotprod"
  containerName: "snapshot"

steps:
- task: AzureCLI@2
  displayName: Ensure resource group, storage account, and container exist
  inputs:
    azureSubscription: 'Azure-Service-Connection-Sub'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      set -e

      RESOURCE_GROUP="$(rgNameProd)"
      LOCATION="$(rgLocationProd)"
      STORAGE_ACCOUNT="$(storageAccountProd)"
      CONTAINER_NAME="$(containerName)"

      echo "Checking resource group: $RESOURCE_GROUP"
      if [ "$(az group exists --name "$RESOURCE_GROUP")" = "true" ]; then
        echo "Resource group already exists: $RESOURCE_GROUP"
      else
        echo "Creating resource group: $RESOURCE_GROUP"
        az group create \
          --name "$RESOURCE_GROUP" \
          --location "$LOCATION" \
          --output none
      fi

      echo "Checking storage account: $STORAGE_ACCOUNT"
      if az storage account show \
        --name "$STORAGE_ACCOUNT" \
        --resource-group "$RESOURCE_GROUP" \
        --query "name" \
        --output tsv >/dev/null 2>&1; then
        echo "Storage account already exists: $STORAGE_ACCOUNT"
      else
        echo "Creating storage account: $STORAGE_ACCOUNT"
        az storage account create \
          --name "$STORAGE_ACCOUNT" \
          --resource-group "$RESOURCE_GROUP" \
          --location "$LOCATION" \
          --sku Standard_LRS \
          --kind StorageV2 \
          --output none
      fi

      echo "Checking blob container: $CONTAINER_NAME"
      CONTAINER_EXISTS=$(az storage container exists \
        --account-name "$STORAGE_ACCOUNT" \
        --auth-mode login \
        --name "$CONTAINER_NAME" \
        --query "exists" \
        --output tsv)

      if [ "$CONTAINER_EXISTS" = "true" ]; then
        echo "Container already exists: $CONTAINER_NAME"
      else
        echo "Creating blob container: $CONTAINER_NAME"
        az storage container create \
          --account-name "$STORAGE_ACCOUNT" \
          --auth-mode login \
          --name "$CONTAINER_NAME" \
          --output none
      fi

      echo "All resources are ready."